name: Jenkins Plugin Verification
on:
  pull_request:
    branches: [ master ]

env:
  JENKINS_URL: "http://localhost:8080"
  JENKINS_USER: "adutt"
  # ideally store this in GitHub Secrets
  JENKINS_TOKEN: "11e2b49cb4eee3c31ff204ad80409249b1" 

jobs:
  verify-plugin:
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Plugin
        run: mvn package -DskipTests

      - name: Deploy Plugin via CLI
        run: |
          Write-Host "Downloading Jenkins CLI..."
          # 1. Download the CLI tool from your local server
          Invoke-WebRequest -Uri "$env:JENKINS_URL/jnlpJars/jenkins-cli.jar" -OutFile "jenkins-cli.jar"
          
          # 2. Get the absolute path to your .hpi file
          $absPath = Convert-Path "target\matlab.hpi"
          # Convert to a URI format (file:///C:/...) so Jenkins can read it directly
          $fileUri = "file:///$($absPath.Replace('\', '/'))"
          
          Write-Host "Installing plugin from: $fileUri"
          
          # 3. Install using the CLI (Bypasses the 500 Error)
          java -jar jenkins-cli.jar -s $env:JENKINS_URL -auth "$($env:JENKINS_USER):$($env:JENKINS_TOKEN)" install-plugin "$fileUri" -deploy

      - name: Restart Jenkins
        run: |
          Write-Host "Triggering Safe Restart..."
          try {
             # Use CLI for restart (cleaner than API call)
             java -jar jenkins-cli.jar -s $env:JENKINS_URL -auth "$($env:JENKINS_USER):$($env:JENKINS_TOKEN)" safe-restart
          } catch {
             Write-Host "Restart command sent."
          }
          
          Write-Host "Waiting for Jenkins to restart..."
          Start-Sleep -Seconds 10
          $count = 0
          do {
            Start-Sleep -Seconds 5
            $count++
            try {
              $response = Invoke-WebRequest -Uri "$env:JENKINS_URL/login" -UseBasicParsing -ErrorAction Stop
              if ($response.StatusCode -eq 200) { break }
            } catch {}
            
            if ($count -gt 60) {
              Write-Error "Timeout waiting for Jenkins to restart."
              exit 1
            }
          } while ($true)
          Write-Host "Jenkins is back up."

      - name: Run Verifier Script
        run: |
          # Ensure python-jenkins is installed
          pip install python-jenkins
          
          Write-Host "Running verification..."
          python jenkins_verifier.py --url $env:JENKINS_URL --user $env:JENKINS_USER --token $env:JENKINS_TOKEN --job "test_project" --log-string "Finished: SUCCESS"