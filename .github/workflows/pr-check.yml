name: Jenkins Plugin Verification
on:
  pull_request:
    branches: [ master ]

env:
  JENKINS_URL: "http://localhost:8080"
  JENKINS_USER: "adutt"
  JENKINS_TOKEN: "**hidden**" 

jobs:
  verify-plugin:
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Plugin
        run: mvn package -DskipTests

      - name: Deploy Plugin to Local Jenkins
        run: |
          $uploadUrl = "$env:JENKINS_URL/pluginManager/uploadPlugin"
          $pluginPath = "target\matlab.hpi"
          Write-Host "Uploading plugin to $uploadUrl..."
          
          # Single optimized upload command
          # -f: Fail fast on HTTP errors (403, 500, etc.)
          # -v: Verbose output for debugging
          # 2>&1: Redirect error stream so we see it in the GitHub Actions log
          
          curl.exe -f -v -u "$($env:JENKINS_USER):$($env:JENKINS_TOKEN)" -F "file=@$pluginPath" $uploadUrl 2>&1
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to upload plugin. Exit code: $LASTEXITCODE"
            exit 1
          }
          Write-Host "Plugin uploaded successfully."

      - name: Restart Jenkins
        run: |
          Write-Host "Triggering Safe Restart..."
          try {
             $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("$($env:JENKINS_USER):$($env:JENKINS_TOKEN)"))
             $headers = @{ Authorization = "Basic $auth" }
             Invoke-WebRequest -Uri "$env:JENKINS_URL/safeRestart" -Method Post -Headers $headers -UseBasicParsing
             Write-Host "Restart request sent."
          } catch {
             Write-Host "Restart request sent (connection dropped as expected)."
          }
          
          Write-Host "Waiting for Jenkins to restart..."
          Start-Sleep -Seconds 10
          $count = 0
          do {
            Start-Sleep -Seconds 5
            $count++
            try {
              $response = Invoke-WebRequest -Uri "$env:JENKINS_URL/login" -UseBasicParsing -ErrorAction Stop
              if ($response.StatusCode -eq 200) { break }
            } catch {}
            
            if ($count -gt 60) {
              Write-Error "Timeout waiting for Jenkins to restart."
              exit 1
            }
          } while ($true)
          Write-Host "Jenkins is back up."

      - name: Run Verifier Script
        run: |
          Write-Host "Running verification..."
          # Double dashes added to --log-string
          python jenkins_verifier.py --url $env:JENKINS_URL --user $env:JENKINS_USER --token $env:JENKINS_TOKEN --job "test_project" --log-string "Finished: SUCCESS"