name: Jenkins Plugin Verification
on:
  pull_request:
    branches: [ master ]

jobs:
  verify-plugin:
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Plugin
        run: mvn package -DskipTests

      - name: Setup Jenkins Environment
        run: |
          # Create a fresh JENKINS_HOME
          $env:JENKINS_HOME = "$PWD\jenkins_home"
          if (Test-Path $env:JENKINS_HOME) { Remove-Item -Recurse -Force $env:JENKINS_HOME }
          New-Item -ItemType Directory -Force "$env:JENKINS_HOME\plugins" | Out-Null
          New-Item -ItemType Directory -Force "$env:JENKINS_HOME\init.groovy.d" | Out-Null
          
          # Create init script for security
          $initScript = @"
          import jenkins.model.*
          import hudson.security.*
          
          def instance = Jenkins.getInstance()
          def hudsonRealm = new HudsonPrivateSecurityRealm(false)
          hudsonRealm.createAccount('admin', 'admin')
          instance.setSecurityRealm(hudsonRealm)
          
          def strategy = new FullControlOnceLoggedInAuthorizationStrategy()
          strategy.setAllowAnonymousRead(true)
          instance.setAuthorizationStrategy(strategy)
          instance.save()
          "@
          Set-Content -Path "$env:JENKINS_HOME\init.groovy.d\basic-security.groovy" -Value $initScript -Encoding ASCII
          
          # Copy the built plugin
          Write-Host "Installing built plugin..."
          Copy-Item "target\matlab.hpi" "$env:JENKINS_HOME\plugins\matlab.jpi"
          
          # Download Jenkins WAR (LTS)
          if (-not (Test-Path "jenkins.war")) {
            Write-Host "Downloading Jenkins WAR..."
            Invoke-WebRequest -Uri "https://get.jenkins.io/war-stable/2.479.3/jenkins.war" -OutFile "jenkins.war"
          }

      - name: Start Jenkins
        run: |
          $env:JENKINS_HOME = "$PWD\jenkins_home"
          
          # Start Jenkins in background
          Write-Host "Starting Jenkins..."
          # Removed argumentsRealm args as we use init.groovy now
          $jenkinsProcess = Start-Process -FilePath "java" -ArgumentList "-jar", "jenkins.war", "--httpPort=8081" -PassThru
          $jenkinsProcess.Id | Out-File "jenkins.pid"
          
          # Wait for Jenkins to start
          Write-Host "Waiting for Jenkins to become ready..."
          $count = 0
          do {
            Start-Sleep -Seconds 5
            $count++
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:8081/login" -UseBasicParsing -ErrorAction Stop
              if ($response.StatusCode -eq 200) { break }
            } catch {}
            
            if ($count -gt 60) {
              Write-Error "Jenkins failed to start within 5 minutes."
              exit 1
            }
          } while ($true)
          Write-Host "Jenkins is up and running."

      - name: Install Dependencies
        run: |
          # Download CLI
          Invoke-WebRequest -Uri "http://localhost:8081/jnlpJars/jenkins-cli.jar" -OutFile "jenkins-cli.jar"
          
          # Install necessary plugins
          Write-Host "Installing dependencies..."
          # Added -webSocket for better connectivity
          java -jar jenkins-cli.jar -s http://localhost:8081/ -webSocket -auth admin:admin install-plugin workflow-aggregator matrix-project junit structs -deploy
            
          # Restart to load plugins
          Write-Host "Restarting Jenkins manually..."
          # Stop the current process
          if (Test-Path "jenkins.pid") {
            $pidVal = Get-Content "jenkins.pid"
            Stop-Process -Id $pidVal -Force -ErrorAction SilentlyContinue
            Remove-Item "jenkins.pid"
          }
          
          # Start Jenkins again
          Write-Host "Starting Jenkins again..."
          $jenkinsProcess = Start-Process -FilePath "java" -ArgumentList "-jar", "jenkins.war", "--httpPort=8081" -PassThru
          $jenkinsProcess.Id | Out-File "jenkins.pid"
          
          # Wait for restart
          Start-Sleep -Seconds 10
          $count = 0
          do {
            Start-Sleep -Seconds 5
            $count++
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:8081/login" -UseBasicParsing -ErrorAction Stop
              if ($response.StatusCode -eq 200) { break }
            } catch {}
            
            if ($count -gt 60) {
              Write-Error "Timeout waiting for restart"
              exit 1
            }
          } while ($true)
          Write-Host "Jenkins restarted."

      - name: Create Test Job
        run: |
          Write-Host "Creating test job..."
          $config = @"
          <?xml version='1.1' encoding='UTF-8'?>
          <flow-definition plugin="workflow-job">
            <description>Test MATLAB Plugin</description>
            <keepDependencies>false</keepDependencies>
            <properties/>
            <definition class="org.jenkinsci.plugins.workflow.cps.CpsFlowDefinition" plugin="workflow-cps">
              <script>
                pipeline {
                    agent any
                    stages {
                        stage('Test') {
                            steps {
                                runMatlabCommand command: 'disp("Hello from Jenkins Verifier")'
                            }
                        }
                    }
                }
              </script>
              <sandbox>true</sandbox>
            </definition>
            <triggers/>
            <disabled>false</disabled>
          </flow-definition>
          "@
          
          Set-Content -Path "job_config.xml" -Value $config
          
          # Use cmd /c to handle input redirection properly for java -jar
          # Added -webSocket
          cmd /c "java -jar jenkins-cli.jar -s http://localhost:8081/ -webSocket -auth admin:admin create-job test-job < job_config.xml"

      - name: Run Verifier
        run: |
          Write-Host "Running verifier script..."
          pip install python-jenkins
          python jenkins_verifier.py --url http://localhost:8081 --user admin --token admin --job test-job --log-string "Hello from Jenkins Verifier"

      - name: Cleanup
        if: always()
        run: |
          Write-Host "Cleaning up..."
          if (Test-Path "jenkins.pid") {
            $pidVal = Get-Content "jenkins.pid"
            Stop-Process -Id $pidVal -Force -ErrorAction SilentlyContinue
          }
          # Optional cleanup
          Remove-Item -Recurse -Force jenkins_home, jenkins.war, jenkins-cli.jar, job_config.xml, jenkins.pid -ErrorAction SilentlyContinue
