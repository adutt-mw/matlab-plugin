name: Jenkins Plugin Verification
on:
  pull_request:
    branches: [ master ]

env:
  JENKINS_URL: "http://localhost:8080"
  JENKINS_USER: "adutt"
  JENKINS_TOKEN: "11e2b49cb4eee3c31ff204ad80409249b1" 

jobs:
  verify-plugin:
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Verifier Script
        run: |
          python jenkins_verifier.py --url $env:JENKINS_URL --user $env:JENKINS_USER --token $env:JENKINS_TOKEN --job "test_project" --log-string "Finished: SUCCESS"